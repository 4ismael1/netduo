name: Quality gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Use supported Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      # postinstall prepares native modules for Electron. Rebuild the SQLite
      # binding for the current Node runtime so migration/purge tests execute
      # instead of being skipped because of an ABI mismatch.
      - name: Prepare native SQLite tests
        run: npm rebuild better-sqlite3

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm test

      - name: Static and native-runtime audit tests
        run: npm run test:audit
        env:
          NETDUO_REQUIRE_NATIVE_SQLITE_TESTS: '1'

      - name: Dependency audit
        run: npm audit

      - name: Build renderer
        run: npm run build

      # Restore the native binding for Electron and prove the packaged app can
      # be assembled. This creates an unpacked smoke build only; it never tags,
      # signs, uploads, or publishes a release.
      - name: Prepare Electron native modules
        run: npx electron-builder install-app-deps

      - name: Package smoke build
        run: npx electron-builder --win dir --x64
