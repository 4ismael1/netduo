<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP is delivered in two layers:
        1. This meta tag — applied immediately at HTML parse time. The
           synchronous local boot script runs before first paint so the
           renderer starts with the persisted theme and sidebar width.
        2. session.webRequest.onHeadersReceived in electron/main.js —
           overrides with the strict production policy at runtime
           (removes localhost / ws:// when isDev === false). Browsers
           apply the intersection when both are present, so the
           header layer can only further restrict, never relax.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' http://localhost:5173; style-src 'self' 'unsafe-inline' http://localhost:5173; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://localhost:5173 ws://localhost:5173; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"
    />
    <title>NetDuo - Network Diagnostics</title>
    <link rel="stylesheet" href="/fonts/netduo-fonts.css" />
    <script src="/netduo-boot.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
